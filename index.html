<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Phoneme Spelling</title>
  <style>
    :root{
      --bg:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --soft:#f3f4f6;
      --accent:#4f46e5;  /* indigo */
      --ok:#16a34a;
      --bad:#ef4444;
      --btn:#111827;
      --btnText:#ffffff;
      --radius:14px;
      --shadow: 0 10px 30px rgba(17,24,39,.08);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px 18px;
    }
    .wrap{
      width:min(980px, 100%);
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:28px;
      color: var(--muted);
      font-size:18px;
    }
    .top b{color:var(--text); font-weight:650}
    .center{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:26px;
      margin-top:10px;
    }

    /* Word display row */
    .wordRow{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:26px;
      flex-wrap:wrap;
      user-select:none;
    }
    .letter{
      font-size:82px;
      font-weight:300;
      letter-spacing: .02em;
      color:#1f2937;
    }
    .slot{
      min-width:110px;
      height:84px;
      border:2px solid var(--line);
      border-radius: 12px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:34px;
      font-family: var(--mono);
      color:#111827;
      padding:0 10px;
      position:relative;
      background:#fff;
    }
    .slot.ok{border-color: rgba(22,163,74,.7); background: rgba(22,163,74,.06)}
    .slot.bad{border-color: rgba(239,68,68,.75); background: rgba(239,68,68,.06)}
    .slot.active{border-color: rgba(79,70,229,.55); box-shadow: 0 0 0 6px rgba(79,70,229,.08)}

    /* Picker controls */
    .picker{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }
    .arrows{
      display:flex;
      flex-direction:column;
      gap:10px;
      color: var(--accent);
      opacity:.9;
      font-size:18px;
      line-height:1;
      user-select:none;
    }
    .arrowBtn{
      width:34px;
      height:34px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition: transform .05s ease, background .15s ease, border-color .15s ease;
    }
    .arrowBtn:hover{background:var(--soft)}
    .arrowBtn:active{transform: translateY(1px)}
    .arrowBtn:focus-visible{
      outline:none;
      border-color: rgba(79,70,229,.55);
      box-shadow: 0 0 0 6px rgba(79,70,229,.10);
    }

    /* Input */
    .inputs{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      width:min(560px, 100%);
    }
    .inputLine{
      width:100%;
      display:flex;
      align-items:center;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
    }
    .inputLine label{
      color: var(--muted);
      font-size:16px;
      width:110px;
      text-align:right;
    }
    .typeBox{
      flex:1;
      min-width:260px;
      max-width:420px;
      height:54px;
      border-radius: 12px;
      border:1px solid var(--line);
      padding:0 14px;
      font-size:20px;
      font-family: var(--mono);
      letter-spacing: .04em;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .typeBox:focus{
      outline:none;
      border-color: rgba(79,70,229,.55);
      box-shadow: 0 0 0 6px rgba(79,70,229,.10);
    }
    .guide{
      width:100%;
      display:flex;
      align-items:flex-start;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      color: var(--muted);
      font-size:16px;
    }
    .guide label{
      width:110px;
      text-align:right;
    }
    .guideRow{
      flex:1;
      min-width:260px;
      max-width:420px;
      display:flex;
      gap:10px;
      justify-content:flex-start;
      flex-wrap:wrap;
      font-family: var(--mono);
      letter-spacing: .05em;
    }
    .guideSeg{
      border-bottom:2px solid var(--line);
      padding:0 4px 6px 4px;
      color:#374151;
    }
    .slash{color:#c0c4cc}

    /* Buttons */
    .btn{
      margin-top:10px;
      width:min(360px, 92%);
      height:66px;
      border-radius: 12px;
      border:none;
      background: var(--btn);
      color: var(--btnText);
      font-size:20px;
      font-weight:650;
      cursor:pointer;
      box-shadow: var(--shadow);
      transition: transform .05s ease, opacity .15s ease;
    }
    .btn:active{transform: translateY(1px)}
    .btn.secondary{
      background:#fff;
      color: var(--text);
      border:1px solid var(--line);
      box-shadow:none;
      height:52px;
      font-size:16px;
      width:auto;
      padding:0 16px;
    }
    .btn.secondary:hover{background:var(--soft)}
    .btnRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      align-items:center;
    }

    /* Feedback */
    .feedback{
      margin-top:6px;
      min-height:26px;
      color: var(--muted);
      font-size:18px;
      text-align:center;
    }
    .feedback strong{color:var(--text)}
    .shake{
      animation: shake .18s linear 0s 2;
    }
    @keyframes shake{
      0%{transform: translateX(0)}
      25%{transform: translateX(-4px)}
      50%{transform: translateX(4px)}
      75%{transform: translateX(-3px)}
      100%{transform: translateX(0)}
    }

    /* Teacher bar */
    details{
      margin-top:18px;
      border:1px solid var(--line);
      border-radius: 12px;
      padding:10px 12px;
      background:#fff;
    }
    summary{
      cursor:pointer;
      color: var(--muted);
      font-size:14px;
      user-select:none;
    }
    .toggles{
      margin-top:12px;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      color: var(--text);
      font-size:14px;
    }
    .toggle{
      display:flex;
      gap:8px;
      align-items:center;
      padding:8px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
    }
    .toggle input{accent-color: var(--accent);}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>Word <b id="wordNum">1</b> of <b id="wordTotal">10</b></div>
      <div>Score: <b id="score">0</b></div>
    </div>

    <div class="center">
      <div id="mainArea"></div>

      <div class="feedback" id="feedback"></div>

      <div class="btnRow">
        <button class="btn" id="primaryBtn">Check Word</button>
        <button class="btn secondary" id="resetBtn" type="button">Reset</button>
        <button class="btn secondary" id="nextBtn" type="button" style="display:none;">Next Word</button>
        <button class="btn secondary" id="showAnswerBtn" type="button" style="display:none;">Show Answer</button>
      </div>

      <details>
        <summary>Teacher controls (prototype)</summary>
        <div class="toggles">
          <div class="toggle">
            <input type="radio" name="mode" id="modeChoice" value="choice" checked>
            <label for="modeChoice">Mode: Grapheme choice</label>
          </div>
          <div class="toggle">
            <input type="radio" name="mode" id="modeGuided" value="guided">
            <label for="modeGuided">Mode: Guided encoding</label>
          </div>
          <div class="toggle">
            <input type="radio" name="mode" id="modeRecall" value="recall">
            <label for="modeRecall">Mode: Full recall</label>
          </div>
          <div class="toggle">
            <input type="checkbox" id="revealAfter2">
            <label for="revealAfter2">Reveal answer after 2 wrong attempts</label>
          </div>
        </div>
      </details>
    </div>
  </div>

<script>
/**
 * Data model supports all three modes.
 * - word: correct spelling
 * - guide: phoneme guide segments (for guided mode)
 * - choice: describes a single target slot with selectable graphemes (choice mode)
 */
const TEST = [
  {
    word: "bright",
    guide: ["b","r","igh","t"],
    choice: { parts:["b","r",null,"t"], targetIndex:2, options:["igh","i-e","ie","y"], answer:"igh" }
  },
  {
    word: "happy",
    guide: ["h","a","pp","y"],
    // for choice mode we’ll target the /ee/ ending spellings as a demo
    choice: { parts:["h","a","pp",null], targetIndex:3, options:["y","ee","ea","e","ie"], answer:"y" }
  },
  {
    word: "chief",
    guide: ["ch","ie","f"],
    choice: { parts:["ch",null,"f"], targetIndex:1, options:["ee","ea","e","y","ie"], answer:"ie" }
  },
  {
    word: "train",
    guide: ["t","r","ai","n"],
    choice: { parts:["t","r",null,"n"], targetIndex:2, options:["ai","ay","a-e","eigh","ea"], answer:"ai" }
  },
  {
    word: "spoil",
    guide: ["s","p","oi","l"],
    choice: { parts:["s","p",null,"l"], targetIndex:2, options:["oi","oy"], answer:"oi" }
  }
];

let queue = [];           // 10 items (cycled from TEST)
let current = 0;
let score = 0;
let attempts = 0;         // attempts on current word
let selectedIndex = 0;    // choice picker index
let mode = "choice";      // choice | guided | recall

const el = (id)=>document.getElementById(id);
const mainArea = el("mainArea");
const feedback = el("feedback");
const primaryBtn = el("primaryBtn");
const nextBtn = el("nextBtn");
const resetBtn = el("resetBtn");
const showAnswerBtn = el("showAnswerBtn");

function buildQueue(){
  // Make 10 words by cycling the demo list
  queue = [];
  for (let i=0;i<10;i++) queue.push(TEST[i % TEST.length]);
}

function getMode(){
  const checked = document.querySelector('input[name="mode"]:checked');
  return checked ? checked.value : "choice";
}

function setTopBar(){
  el("wordTotal").textContent = queue.length;
  el("wordNum").textContent = (current + 1);
  el("score").textContent = score;
}

function clearFeedback(){
  feedback.textContent = "";
  feedback.style.color = "var(--muted)";
}

function showTryAgain(){
  feedback.innerHTML = `Not quite. <strong>Try again.</strong>`;
  feedback.style.color = "var(--muted)";
}

function showCorrect(){
  feedback.innerHTML = `<strong>Correct.</strong>`;
  feedback.style.color = "var(--muted)";
}

function showReveal(word){
  feedback.innerHTML = `Correct spelling: <strong>${word}</strong>`;
  feedback.style.color = "var(--muted)";
}

function setButtonsForState({canNext=false, canShowAnswer=false}){
  nextBtn.style.display = canNext ? "inline-block" : "none";
  showAnswerBtn.style.display = canShowAnswer ? "inline-block" : "none";
}

function render(){
  mode = getMode();
  attempts = 0;
  selectedIndex = 0;
  clearFeedback();
  setButtonsForState({canNext:false, canShowAnswer:false});
  primaryBtn.textContent = "Check Word";

  setTopBar();

  const item = queue[current];

  if (mode === "choice") renderChoice(item);
  if (mode === "guided") renderGuided(item, true);
  if (mode === "recall") renderGuided(item, false);
}

function renderChoice(item){
  const { parts, targetIndex, options } = item.choice;

  const wordRow = document.createElement("div");
  wordRow.className = "wordRow";

  parts.forEach((p, i) => {
    if (i === targetIndex){
      const pickerWrap = document.createElement("div");
      pickerWrap.className = "picker";

      const up = document.createElement("button");
      up.className = "arrowBtn";
      up.innerHTML = "˄";
      up.addEventListener("click", ()=> moveChoice(-1));
      up.setAttribute("aria-label","Previous option");

      const slot = document.createElement("div");
      slot.className = "slot active";
      slot.id = "choiceSlot";
      slot.textContent = options[selectedIndex];

      const down = document.createElement("button");
      down.className = "arrowBtn";
      down.innerHTML = "˅";
      down.addEventListener("click", ()=> moveChoice(1));
      down.setAttribute("aria-label","Next option");

      pickerWrap.appendChild(up);
      pickerWrap.appendChild(slot);
      pickerWrap.appendChild(down);

      wordRow.appendChild(pickerWrap);
    } else {
      const span = document.createElement("div");
      span.className = "letter";
      span.textContent = p;
      wordRow.appendChild(span);
    }
  });

  mainArea.innerHTML = "";
  mainArea.appendChild(wordRow);

  // Keyboard for choice mode
  window.onkeydown = (e)=>{
    if (mode !== "choice") return;
    if (e.key === "ArrowUp") moveChoice(-1);
    if (e.key === "ArrowDown") moveChoice(1);
    if (e.key === "Enter") check();
  };
}

function moveChoice(delta){
  const item = queue[current];
  const opts = item.choice.options;
  selectedIndex = (selectedIndex + delta + opts.length) % opts.length;
  const slot = el("choiceSlot");
  if (slot) slot.textContent = opts[selectedIndex];
  // clear wrong styling when changing selection
  if (slot){
    slot.classList.remove("bad");
    slot.classList.add("active");
  }
  clearFeedback();
  setButtonsForState({canNext:false, canShowAnswer:false});
}

function renderGuided(item, showGuide){
  const inputs = document.createElement("div");
  inputs.className = "inputs";

  // Audio button placeholder (later)
  // Keeping minimal: you can wire it when ready.
  // const audio = document.createElement("button");

  const line = document.createElement("div");
  line.className = "inputLine";
  const lab = document.createElement("label");
  lab.textContent = "Type answer:";
  const input = document.createElement("input");
  input.className = "typeBox";
  input.id = "typeInput";
  input.autocomplete = "off";
  input.spellcheck = false;
  input.placeholder = "";
  line.appendChild(lab);
  line.appendChild(input);

  inputs.appendChild(line);

  if (showGuide){
    const guide = document.createElement("div");
    guide.className = "guide";
    const glab = document.createElement("label");
    glab.textContent = "Looks like:";
    const row = document.createElement("div");
    row.className = "guideRow";
    item.guide.forEach((seg, i)=>{
      const s = document.createElement("span");
      s.className = "guideSeg";
      s.textContent = seg;
      row.appendChild(s);
      if (i < item.guide.length - 1){
        const slash = document.createElement("span");
        slash.className = "slash";
        slash.textContent = "/";
        row.appendChild(slash);
      }
    });
    guide.appendChild(glab);
    guide.appendChild(row);
    inputs.appendChild(guide);
  }

  mainArea.innerHTML = "";
  mainArea.appendChild(inputs);

  window.onkeydown = (e)=>{
    if (mode === "guided" || mode === "recall"){
      if (e.key === "Enter") check();
    }
  };

  // focus
  setTimeout(()=> input.focus(), 50);
}

function check(){
  const item = queue[current];
  const revealAfter2 = el("revealAfter2").checked;

  // CHOICE MODE
  if (mode === "choice"){
    const slot = el("choiceSlot");
    const picked = item.choice.options[selectedIndex];
    const correct = picked === item.choice.answer;

    if (correct){
      slot.classList.remove("bad","active");
      slot.classList.add("ok");
      showCorrect();

      // score only if correct on first attempt
      if (attempts === 0) score += 1;
      attempts = 0;

      setTopBar();
      setButtonsForState({canNext:true, canShowAnswer:false});
      return;
    }

    // wrong
    attempts += 1;
    slot.classList.remove("ok");
    slot.classList.add("bad","shake");
    showTryAgain();

    // allow reveal option after 2 wrong attempts (optional)
    setButtonsForState({canNext:false, canShowAnswer: revealAfter2 && attempts >= 2});

    setTimeout(()=> slot.classList.remove("shake"), 250);
    return;
  }

  // GUIDED / RECALL MODE
  const input = el("typeInput");
  const typed = (input.value || "").trim().toLowerCase();
  const correct = item.word.toLowerCase();

  if (typed === correct){
    showCorrect();
    if (attempts === 0) score += 1; // first-try scoring
    attempts = 0;
    setTopBar();
    setButtonsForState({canNext:true, canShowAnswer:false});
    return;
  }

  attempts += 1;
  showTryAgain();

  // subtle shake the input
  input.classList.add("shake");
  setTimeout(()=> input.classList.remove("shake"), 250);

  setButtonsForState({canNext:false, canShowAnswer: el("revealAfter2").checked && attempts >= 2});
}

function revealAnswer(){
  const item = queue[current];
  showReveal(item.word);
}

function next(){
  current = (current + 1) % queue.length;
  render();
}

function reset(){
  // reset current word attempts/visuals only
  render();
}

primaryBtn.addEventListener("click", check);
nextBtn.addEventListener("click", next);
resetBtn.addEventListener("click", reset);
showAnswerBtn.addEventListener("click", revealAnswer);

// Teacher mode changes should rerender
document.querySelectorAll('input[name="mode"]').forEach(r=>{
  r.addEventListener("change", ()=> render());
});
el("revealAfter2").addEventListener("change", ()=> {
  // doesn’t need rerender, but keeps state consistent
  setButtonsForState({canNext:false, canShowAnswer:false});
});

buildQueue();
render();
</script>
</body>
</html>
