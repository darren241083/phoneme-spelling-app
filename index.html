<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Phoneme Spelling</title>
  <style>
    :root{
      --bg:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --soft:#f3f4f6;
      --accent:#4f46e5;
      --ok:#16a34a;
      --bad:#ef4444;
      --btn:#111827;
      --btnText:#ffffff;
      --shadow: 0 10px 30px rgba(17,24,39,.08);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px 18px;
    }
    .wrap{ width:min(980px, 100%); }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:26px;
      color: var(--muted);
      font-size:18px;
    }
    .top b{color:var(--text); font-weight:650}
    .center{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      margin-top:6px;
    }

    /* Choice display */
    .wordRow{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:26px;
      flex-wrap:wrap;
      user-select:none;
    }
    .letter{
      font-size:82px;
      font-weight:300;
      letter-spacing: .02em;
      color:#1f2937;
    }
    .slot{
      width:124px;
      height:84px;
      border:2px solid var(--line);
      border-radius: 12px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:32px;
      font-family: var(--mono);
      color:#111827;
      padding:0 10px;
      background:#fff;
      transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;
    }
    .slot.ok{border-color: rgba(22,163,74,.7); background: rgba(22,163,74,.06)}
    .slot.bad{border-color: rgba(239,68,68,.75); background: rgba(239,68,68,.06)}
    .slot.active{border-color: rgba(79,70,229,.55); box-shadow: 0 0 0 6px rgba(79,70,229,.08)}

    .picker{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }
    .arrowBtn{
      width:36px;
      height:36px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition: transform .05s ease, background .15s ease, border-color .15s ease;
      color: var(--accent);
      font-size:16px;
      line-height:1;
      user-select:none;
    }
    .arrowBtn:hover{background:var(--soft)}
    .arrowBtn:active{transform: translateY(1px)}
    .arrowBtn:focus-visible{
      outline:none;
      border-color: rgba(79,70,229,.55);
      box-shadow: 0 0 0 6px rgba(79,70,229,.10);
    }

    /* Guided/Recall segmented inputs */
    .inputs{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      width:min(760px, 100%);
    }
    .labelRow{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      color: var(--muted);
      font-size:16px;
    }
    .segRow{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .segInput{
      width:110px;
      height:62px;
      border-radius: 12px;
      border:2px solid var(--line);
      background:#fff;
      font-family: var(--mono);
      font-size:22px;
      text-align:center;
      letter-spacing:.06em;
      transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
    }
    .segInput:focus{
      outline:none;
      border-color: rgba(79,70,229,.55);
      box-shadow: 0 0 0 6px rgba(79,70,229,.10);
    }
    .segInput.ok{border-color: rgba(22,163,74,.7); background: rgba(22,163,74,.06)}
    .segInput.bad{border-color: rgba(239,68,68,.75); background: rgba(239,68,68,.06)}
    .slash{
      font-family: var(--mono);
      color:#9ca3af;
      font-size:22px;
      user-select:none;
    }
    .hint{
      color: var(--muted);
      font-size:14px;
      text-align:center;
      margin-top:4px;
    }

    /* Buttons */
    .btnRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      align-items:center;
      margin-top:4px;
    }
    .btn{
      width:min(360px, 92%);
      height:66px;
      border-radius: 12px;
      border:none;
      background: var(--btn);
      color: var(--btnText);
      font-size:20px;
      font-weight:650;
      cursor:pointer;
      box-shadow: var(--shadow);
      transition: transform .05s ease, opacity .15s ease;
    }
    .btn:active{transform: translateY(1px)}
    .btn.secondary{
      background:#fff;
      color: var(--text);
      border:1px solid var(--line);
      box-shadow:none;
      height:52px;
      font-size:16px;
      width:auto;
      padding:0 16px;
    }
    .btn.secondary:hover{background:var(--soft)}

    .feedback{
      min-height:26px;
      color: var(--muted);
      font-size:18px;
      text-align:center;
      margin-top:2px;
    }
    .feedback strong{color:var(--text)}
    .shake{ animation: shake .18s linear 0s 2; }
    @keyframes shake{
      0%{transform: translateX(0)}
      25%{transform: translateX(-4px)}
      50%{transform: translateX(4px)}
      75%{transform: translateX(-3px)}
      100%{transform: translateX(0)}
    }

    details{
      margin-top:14px;
      border:1px solid var(--line);
      border-radius: 12px;
      padding:10px 12px;
      background:#fff;
      width:min(760px, 100%);
    }
    summary{
      cursor:pointer;
      color: var(--muted);
      font-size:14px;
      user-select:none;
    }
    .toggles{
      margin-top:12px;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      color: var(--text);
      font-size:14px;
    }
    .toggle{
      display:flex;
      gap:8px;
      align-items:center;
      padding:8px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
    }
    .toggle input{accent-color: var(--accent);}

    @media (max-width:520px){
      .letter{font-size:64px}
      .slot{height:74px; width:112px; font-size:28px}
      .segInput{width:92px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>Word <b id="wordNum">1</b> of <b id="wordTotal">10</b></div>
      <div>Score: <b id="score">0</b></div>
    </div>

    <div class="center">
      <div id="mainArea"></div>

      <div class="btnRow">
        <button class="btn secondary" id="speakBtn" type="button" aria-label="Speak word" title="Listen">🔊 Listen</button>
      </div>

      <div class="feedback" id="feedback" aria-live="polite"></div>

      <div class="btnRow">
        <button class="btn" id="primaryBtn">Check Word</button>
        <button class="btn secondary" id="resetBtn" type="button">Reset</button>
        <button class="btn secondary" id="nextBtn" type="button" style="display:none;">Next Word</button>
        <button class="btn secondary" id="showAnswerBtn" type="button" style="display:none;">Show Answer</button>
      </div>

      <details>
        <summary>Teacher controls (prototype)</summary>
        <div class="toggles">
          <div class="toggle">
            <input type="radio" name="mode" id="modeChoice" value="choice" checked>
            <label for="modeChoice">Mode: Grapheme choice</label>
          </div>
          <div class="toggle">
            <input type="radio" name="mode" id="modeGuided" value="guided">
            <label for="modeGuided">Mode: Guided encoding</label>
          </div>
          <div class="toggle">
            <input type="radio" name="mode" id="modeRecall" value="recall">
            <label for="modeRecall">Mode: Full recall</label>
          </div>
          <div class="toggle">
            <input type="checkbox" id="revealAfter2">
            <label for="revealAfter2">Reveal answer after 2 wrong attempts</label>
          </div>
        </div>
      </details>
    </div>
  </div>

<script>
  const el = (id)=>document.getElementById(id);

  /**
   * For guided/recall segmented inputs, we need the correct segments (not shown to pupil).
   * In recall mode: we still use segments internally to check the full word.
   */
  const TEST = [
    { word: "bright", segments: ["b","r","igh","t"], choice: { parts:["b","r",null,"t"], targetIndex:2, options:["igh","i-e","ie","y"], answer:"igh" } },
    { word: "happy",  segments: ["h","a","pp","y"],  choice: { parts:["h","a","pp",null], targetIndex:3, options:["y","ee","ea","e","ie"], answer:"y" } },
    { word: "chief",  segments: ["ch","ie","f"],     choice: { parts:["ch",null,"f"], targetIndex:1, options:["ee","ea","e","y","ie"], answer:"ie" } },
    { word: "train",  segments: ["t","r","ai","n"],  choice: { parts:["t","r",null,"n"], targetIndex:2, options:["ai","ay","a-e","eigh","ea"], answer:"ai" } },
    { word: "spoil",  segments: ["s","p","oi","l"],  choice: { parts:["s","p",null,"l"], targetIndex:2, options:["oi","oy"], answer:"oi" } }
  ];

  let queue = [];
  let current = 0;
  let score = 0;
  let attempts = 0;
  let selectedIndex = 0;
  let mode = "choice";

  const mainArea = el("mainArea");
  const feedback = el("feedback");
  const primaryBtn = el("primaryBtn");
  const nextBtn = el("nextBtn");
  const resetBtn = el("resetBtn");
  const showAnswerBtn = el("showAnswerBtn");
  const speakBtn = el("speakBtn");

  function buildQueue(){
    queue = [];
    for (let i=0;i<10;i++) queue.push(TEST[i % TEST.length]);
  }

  function getMode(){
    const checked = document.querySelector('input[name="mode"]:checked');
    return checked ? checked.value : "choice";
  }

  function setTopBar(){
    el("wordTotal").textContent = queue.length;
    el("wordNum").textContent = (current + 1);
    el("score").textContent = score;
  }

  function clearFeedback(){ feedback.textContent = ""; }

  function showTryAgain(){ feedback.innerHTML = `Not quite. <strong>Try again.</strong>`; }
  function showCorrect(){ feedback.innerHTML = `<strong>Correct.</strong>`; }
  function showReveal(word){ feedback.innerHTML = `Correct spelling: <strong>${word}</strong>`; }

  function setButtonsForState({canNext=false, canShowAnswer=false}){
    nextBtn.style.display = canNext ? "inline-block" : "none";
    showAnswerBtn.style.display = canShowAnswer ? "inline-block" : "none";
  }

  function speakCurrentWord(){
    const item = queue[current];
    const word = item.word;

    if (!("speechSynthesis" in window)){
      feedback.textContent = "Text-to-speech not supported in this browser.";
      return;
    }

    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.rate = 0.9;
    u.pitch = 1.0;
    u.volume = 1.0;

    const voices = window.speechSynthesis.getVoices?.() || [];
    const preferred = voices.find(v => /en-GB/i.test(v.lang)) || voices.find(v => /^en/i.test(v.lang));
    if (preferred) u.voice = preferred;

    window.speechSynthesis.speak(u);
  }

  function render(){
    mode = getMode();
    attempts = 0;
    selectedIndex = 0;
    clearFeedback();
    setButtonsForState({canNext:false, canShowAnswer:false});
    primaryBtn.textContent = "Check Word";
    setTopBar();

    const item = queue[current];
    if (mode === "choice") renderChoice(item);
    if (mode === "guided") renderSegmented(item, true);
    if (mode === "recall") renderSegmented(item, false);
  }

  function renderChoice(item){
    const { parts, targetIndex, options } = item.choice;

    const wordRow = document.createElement("div");
    wordRow.className = "wordRow";

    parts.forEach((p, i) => {
      if (i === targetIndex){
        const pickerWrap = document.createElement("div");
        pickerWrap.className = "picker";

        const up = document.createElement("button");
        up.className = "arrowBtn";
        up.textContent = "˄";
        up.addEventListener("click", ()=> moveChoice(-1));
        up.setAttribute("aria-label","Previous option");

        const slot = document.createElement("div");
        slot.className = "slot active";
        slot.id = "choiceSlot";
        slot.textContent = options[selectedIndex];

        const down = document.createElement("button");
        down.className = "arrowBtn";
        down.textContent = "˅";
        down.addEventListener("click", ()=> moveChoice(1));
        down.setAttribute("aria-label","Next option");

        pickerWrap.appendChild(up);
        pickerWrap.appendChild(slot);
        pickerWrap.appendChild(down);
        wordRow.appendChild(pickerWrap);
      } else {
        const span = document.createElement("div");
        span.className = "letter";
        span.textContent = p;
        wordRow.appendChild(span);
      }
    });

    mainArea.innerHTML = "";
    mainArea.appendChild(wordRow);

    window.onkeydown = (e)=>{
      if (mode !== "choice") return;
      if (e.key === "ArrowUp") moveChoice(-1);
      if (e.key === "ArrowDown") moveChoice(1);
      if (e.key === "Enter") check();
    };
  }

  function moveChoice(delta){
    const item = queue[current];
    const opts = item.choice.options;
    selectedIndex = (selectedIndex + delta + opts.length) % opts.length;

    const slot = el("choiceSlot");
    if (slot){
      slot.textContent = opts[selectedIndex];
      slot.classList.remove("bad","ok","shake");
      slot.classList.add("active");
    }
    clearFeedback();
    setButtonsForState({canNext:false, canShowAnswer:false});
  }

  // Segmented input mode:
  // guided=true: show the segmented boxes with slashes (but never show the correct segments)
  // guided=false (recall): still segmented boxes, but the user must spell whole word correctly across segments
  function renderSegmented(item, guided){
    const box = document.createElement("div");
    box.className = "inputs";

    const label = document.createElement("div");
    label.className = "labelRow";
    label.textContent = "Type the spelling for each sound:";

    const row = document.createElement("div");
    row.className = "segRow";

    const segCount = item.segments.length;

    for (let i=0;i<segCount;i++){
      const inp = document.createElement("input");
      inp.className = "segInput";
      inp.inputMode = "text";
      inp.autocomplete = "off";
      inp.spellcheck = false;
      inp.maxLength = 6; // enough for "eigh" etc
      inp.dataset.index = String(i);
      inp.placeholder = "___";
      inp.addEventListener("input", ()=>{
        // clear styling on edit
        inp.classList.remove("bad","ok");
        clearFeedback();
        setButtonsForState({canNext:false, canShowAnswer:false});
      });

      // keyboard: advance on space or /
      inp.addEventListener("keydown", (e)=>{
        if (e.key === "Enter"){ e.preventDefault(); check(); return; }
        if (e.key === "/" || e.key === " "){
          e.preventDefault();
          focusSeg(i+1);
        }
        if (e.key === "Backspace" && inp.value === ""){
          focusSeg(i-1);
        }
      });

      row.appendChild(inp);

      if (i < segCount - 1){
        const slash = document.createElement("span");
        slash.className = "slash";
        slash.textContent = "/";
        row.appendChild(slash);
      }
    }

    const hint = document.createElement("div");
    hint.className = "hint";
    hint.textContent = guided
      ? "Use the sound slots. You won’t be shown the answer."
      : "Full recall: spell the word correctly across the sound slots.";

    box.appendChild(label);
    box.appendChild(row);
    box.appendChild(hint);

    mainArea.innerHTML = "";
    mainArea.appendChild(box);

    // focus first segment
    setTimeout(()=> focusSeg(0), 50);

    window.onkeydown = (e)=>{
      if (mode === "guided" || mode === "recall"){
        if (e.key === "Enter") check();
      }
    };
  }

  function focusSeg(i){
    const inputs = [...document.querySelectorAll(".segInput")];
    if (i < 0 || i >= inputs.length) return;
    inputs[i].focus();
    inputs[i].select?.();
  }

  function getSegmentInputs(){
    return [...document.querySelectorAll(".segInput")];
  }

  function check(){
    const item = queue[current];
    const revealAfter2 = el("revealAfter2").checked;

    if (mode === "choice"){
      const slot = el("choiceSlot");
      const picked = item.choice.options[selectedIndex];
      const correct = picked === item.choice.answer;

      if (correct){
        slot.classList.remove("bad","active","shake");
        slot.classList.add("ok");
        showCorrect();
        if (attempts === 0) score += 1;
        attempts = 0;
        setTopBar();
        setButtonsForState({canNext:true, canShowAnswer:false});
        return;
      }

      attempts += 1;
      slot.classList.remove("ok");
      slot.classList.add("bad","shake");
      showTryAgain();
      setButtonsForState({canNext:false, canShowAnswer: revealAfter2 && attempts >= 2});
      setTimeout(()=> slot.classList.remove("shake"), 250);
      return;
    }

    // guided / recall segmented checking (never show answer automatically)
    const inputs = getSegmentInputs();
    const typedSegments = inputs.map(i => (i.value || "").trim().toLowerCase());
    const correctSegments = item.segments.map(s => s.toLowerCase());

    // Check full word correctness: typedSegments must match exact segments
    const allMatch = typedSegments.length === correctSegments.length &&
      typedSegments.every((v, i) => v === correctSegments[i]);

    if (allMatch){
      // mark all ok
      inputs.forEach(inp => { inp.classList.remove("bad","shake"); inp.classList.add("ok"); });
      showCorrect();
      if (attempts === 0) score += 1;
      attempts = 0;
      setTopBar();
      setButtonsForState({canNext:true, canShowAnswer:false});
      return;
    }

    attempts += 1;

    // mark incorrect segments (only where non-empty and wrong)
    inputs.forEach((inp, i)=>{
      const v = (inp.value || "").trim().toLowerCase();
      inp.classList.remove("ok");
      if (v && v !== correctSegments[i]) inp.classList.add("bad");
      if (!v) inp.classList.remove("bad");
    });

    showTryAgain();

    // shake the row subtly
    const row = document.querySelector(".segRow");
    if (row){
      row.classList.add("shake");
      setTimeout(()=> row.classList.remove("shake"), 250);
    }

    setButtonsForState({canNext:false, canShowAnswer: revealAfter2 && attempts >= 2});
  }

  function revealAnswer(){
    const item = queue[current];
    // Only reveal via explicit button (or toggle logic)
    showReveal(item.word);
  }

  function next(){
    current = (current + 1) % queue.length;
    render();
  }

  function reset(){
    render();
  }

  // events
  primaryBtn.addEventListener("click", check);
  nextBtn.addEventListener("click", next);
  resetBtn.addEventListener("click", reset);
  showAnswerBtn.addEventListener("click", revealAnswer);
  speakBtn.addEventListener("click", speakCurrentWord);

  document.querySelectorAll('input[name="mode"]').forEach(r=>{
    r.addEventListener("change", ()=> render());
  });
  el("revealAfter2").addEventListener("change", ()=> {
    setButtonsForState({canNext:false, canShowAnswer:false});
  });

  buildQueue();
  render();
</script>
</body>
</html>
