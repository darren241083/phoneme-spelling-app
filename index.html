<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Phoneme Spelling App</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: system-ui;
  text-align: center;
  padding: 40px;
  transition: background 0.3s, color 0.3s;
}

h1 { font-weight: 600; }

.word-box {
  font-size: 32px;
  letter-spacing: 8px;
  margin: 30px 0;
}

input {
  font-size: 20px;
  padding: 10px;
  width: 260px;
  text-align: center;
}

button {
  padding: 12px 20px;
  margin: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.primary {
  background: #0f172a;
  color: white;
}

.secondary {
  background: #e2e8f0;
}

.correct { color: #15803d; }
.wrong { color: #b91c1c; }

.controls {
  margin-top: 40px;
  padding: 20px;
  border-top: 1px solid #ddd;
}
</style>
</head>

<body>

<h1>Phoneme Spelling App</h1>

<div id="auth"></div>

<div id="app" style="display:none">

<div>
  <button onclick="speakWord()">🔊 Listen</button>
</div>

<div class="word-box" id="wordDisplay"></div>

<input id="answerInput" placeholder="Type spelling..." />

<div>
  <button class="primary" onclick="checkAnswer()">Check</button>
  <button class="secondary" onclick="nextWord()">Next</button>
</div>

<div id="feedback"></div>

<div class="controls">
  <h3>Accessibility</h3>
  Background:
  <input type="color" onchange="document.body.style.background=this.value">
  Text:
  <input type="color" onchange="document.body.style.color=this.value">
</div>

</div>

<script>
/* ================================
   🔐 PASTE YOUR SUPABASE DETAILS HERE
   ================================ */

const SUPABASE_URL = "https://hkorcwsbuwreaupdbkaf.supabase.co";
const SUPABASE_KEY = "sb_publishable_3Qz-fLYy9x5dEPvFVu2dlw_WBlczkBW";

/* ================================= */

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let words = [];
let currentIndex = 0;

init();

async function init() {

  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    showLogin();
  } else {
    loadApp();
  }
}

function showLogin() {
  document.getElementById("auth").innerHTML = `
    <button class="primary" onclick="login()">Sign in with Google</button>
  `;
}

async function login() {
  await supabase.auth.signInWithOAuth({
    provider: 'google'
  });
}

async function loadApp() {

  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";

  const { data } = await supabase
    .from("words")
    .select("*");

  words = data || [];

  displayWord();
}

function displayWord() {
  if (!words.length) {
    document.getElementById("wordDisplay").innerText = "No words found.";
    return;
  }

  document.getElementById("wordDisplay").innerText = words[currentIndex].word;
  document.getElementById("answerInput").value = "";
  document.getElementById("feedback").innerText = "";
}

function checkAnswer() {
  const input = document.getElementById("answerInput").value.trim().toLowerCase();
  const correct = words[currentIndex].word.toLowerCase();

  if (input === correct) {
    document.getElementById("feedback").innerHTML =
      `<p class="correct">Correct ✔</p>`;
  } else {
    document.getElementById("feedback").innerHTML =
      `<p class="wrong">Try again</p>`;
  }
}

function nextWord() {
  currentIndex++;
  if (currentIndex >= words.length) currentIndex = 0;
  displayWord();
}

function speakWord() {
  const utterance = new SpeechSynthesisUtterance(words[currentIndex].word);
  speechSynthesis.speak(utterance);
}

supabase.auth.onAuthStateChange((event, session) => {
  if (session) loadApp();
});
</script>

</body>
</html>
